# Deploy the React frontend to GitHub Pages.
# The backend is NOT deployed here — point VITE_API_URL at a hosted backend
# (e.g. Render free tier) via a repository secret before enabling this workflow.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project-management-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project-management-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Set in repo Settings → Secrets → Actions → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Must match the GitHub Pages path: /<repo-name>/
          VITE_BASE_URL: /PLUMP/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: project-management-ui/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
